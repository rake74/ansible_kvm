---
- name: Install containerd
  ansible.builtin.pacman:
    name: containerd
    state: present
  timeout: 60

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory

- name: Generate containerd default config if not exists
  ansible.builtin.command:
    cmd: containerd config default
    creates: /etc/containerd/config.toml
  register: containerd_config
  changed_when: containerd_config.rc != 0

- name: Write containerd config file if it was generated
  ansible.builtin.copy:
    content: "{{ containerd_config.stdout }}"
    dest: /etc/containerd/config.toml
  when: containerd_config.changed

- name: Ensure SystemdCgroup is set to true
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: '(\s*SystemdCgroup\s*=\s*)false'
    replace: '\1true'
  notify: Restart containerd

- name: Ensure containerd service is active and enabled
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true
