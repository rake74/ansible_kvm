---
- name: Install kubeadm, kubelet, kubectl
  ansible.builtin.pacman:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present

- name: Enable kubelet service
  ansible.builtin.systemd:
    name: kubelet
    enabled: true

- name: Initialize Kubernetes cluster
  ansible.builtin.command:
    cmd: "kubeadm init --pod-network-cidr=10.244.0.0/16 --apiserver-advertise-address={{ ansible_default_ipv4.address }}"
    creates: /etc/kubernetes/admin.conf
  register: kubeadm_init_output

- name: Create .kube directory for current user
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  become: false

- name: Fetch admin.conf from master node
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "/tmp/kube-admin.conf"
    flat: yes
  become: true # Run as root to read the source file

- name: Copy admin.conf to user's .kube directory
  ansible.builtin.copy:
    src: /tmp/kube-admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  become: false # Run as the user to write to the home directory

- name: Install Calico Pod Network Addon
  ansible.builtin.command: "kubectl apply -f https://docs.projectcalico.org/manifests/calico.yaml"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Get kubeadm join command for workers
  ansible.builtin.command: kubeadm token create --print-join-command
  register: kubeadm_join_command
  when: kubeadm_init_output.changed

- name: Save join command for later use
  ansible.builtin.set_fact:
    join_command: "{{ kubeadm_join_command.stdout }}"
  when: kubeadm_join_command.changed
