---
- name: Install kubeadm, kubelet, kubectl
  ansible.builtin.apt:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present
    update_cache: yes

- name: Hold Kubernetes packages at their current version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubelet
    - kubectl

- name: Enable kubelet service
  ansible.builtin.systemd:
    name: kubelet
    enabled: true

- name: Join worker to the cluster
  ansible.builtin.command:
    cmd: "{{ hostvars[groups['kube_master'][0]].join_command }}"
    creates: /etc/kubernetes/kubelet.conf
  when: hostvars[groups['kube_master'][0]].join_command is defined
