---
- name: Provision KVM infrastructure for Kubernetes cluster
  hosts: localhost
  become: yes

  pre_tasks:
    - name: Load all OS-specific variables for all roles
      ansible.builtin.include_vars: "{{ item }}"
      loop:
        - "roles/kvm_host/vars/{{ ansible_os_family }}.yml"

  roles:
    - kvm_host
    - role: provision_k8s_vms
      vars:
        state: present
